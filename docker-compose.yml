version: "3.9"

services:
  victor-api:
    build: ./app
    container_name: victor-api
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    volumes:
      # Only needed in SSL mode — leave unset for reverse proxy mode
      - ./certs:/certs:ro
    environment:
      # --- Server ---
      PORT:         ${PORT:-8080}
      # SSL mode:   set both of these to enable TLS directly in uvicorn
      # Proxy mode: leave both commented out and let your reverse proxy handle TLS
      #SSL_CERTFILE: /certs/cert.pem
      #SSL_KEYFILE:  /certs/key.pem

      # --- MQTT broker ---
      MQTT_HOST:    ${MQTT_HOST}
      MQTT_PORT:    ${MQTT_PORT:-1883}
      MQTT_USER:    ${MQTT_USER}
      MQTT_PASS:    ${MQTT_PASS}
      MQTT_PREFIX:  ${MQTT_PREFIX:-victor}

      # --- Device tokens ---
      # One entry per trap. Format: SERIAL1:TOKEN1,SERIAL2:TOKEN2
      # Get token: curl -X POST https://www.victorsmarthost.com/api-token-auth/
      #                 -H "Content-Type: application/json"
      #                 -d '{"username":"<serial>","password":"<password>"}'
      DEVICE_TOKENS: ${DEVICE_TOKENS}
