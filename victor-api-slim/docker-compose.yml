version: "3.9"

services:

  # -------------------------------------------------------------------------
  # Victor Smart-Kill API
  # -------------------------------------------------------------------------
  victor-api:
    build: ./app
    container_name: victor-api
    restart: unless-stopped
    environment:
      # Your existing MQTT broker
      MQTT_HOST:    ${MQTT_HOST}
      MQTT_PORT:    ${MQTT_PORT:-1883}
      MQTT_USER:    ${MQTT_USER}
      MQTT_PASS:    ${MQTT_PASS}
      MQTT_PREFIX:  ${MQTT_PREFIX:-victor}
      # Device token map — one entry per trap
      # Format: SERIAL1:TOKEN1,SERIAL2:TOKEN2
      DEVICE_TOKENS: ${DEVICE_TOKENS}
    networks:
      - victor-net

  # -------------------------------------------------------------------------
  # nginx — HTTPS termination on port 443
  # -------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: victor-nginx
    restart: unless-stopped
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - victor-api
    networks:
      - victor-net

networks:
  victor-net:
    driver: bridge
